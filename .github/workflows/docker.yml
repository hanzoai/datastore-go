name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']
permissions:
  contents: read
  packages: write
jobs:
  docker:
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/datastore-server
            dockerfile: Dockerfile
          - image: ghcr.io/hanzoai/datastore-proxy
            dockerfile: Dockerfile.proxy
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
    secrets: inherit
